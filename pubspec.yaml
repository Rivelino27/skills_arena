name: skills_arena
description: Skills Arena - Flutter + Firebase

publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter

  # Firebase
  firebase_core: ^2.27.0
  firebase_auth: ^4.17.0
  cloud_firestore: ^4.15.0
  firebase_storage: ^11.6.0
  google_sign_in: ^6.2.1

  # Estado
  flutter_riverpod: ^2.5.1

  # Roteamento
  go_router: ^17.2.3

  # Navegacao
  persistent_bottom_nav_bar_v2: ^6.2.0

  # Utilitarios
  dartz: ^0.10.1
  equatable: ^2.0.5

  # UI
  cupertino_icons: ^1.0.6
  cached_network_image: ^3.3.1
  image_picker: ^1.0.7

  # Armazenamento local
  shared_preferences: ^2.2.3

  # Mapa e localizacao
  flutter_map: ^7.0.2
  latlong2: ^0.9.0
  geolocator: ^12.0.0
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/